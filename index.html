<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário Branquela 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    min-height:100dvh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(180deg,#ffb6c1,#ffc0cb,#ffd6e0);
    overflow:hidden;
}

/* TELA INICIAL */
.start{
    position:fixed;
    width:100%;
    height:100%;
    background:#ffb6c1;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
    transition:1s;
}
.start.hide{
    opacity:0;
    transform:scale(1.2);
    pointer-events:none;
}

/* FUNDO */
.floating{
    position:fixed;
    width:100%;
    height:100%;
    z-index:0;
}

.item{
    position:absolute;
    animation: float 10s linear infinite;
}

@keyframes float{
    from{ transform:translateY(100vh);}
    to{ transform:translateY(-10vh);}
}

.container{text-align:center;z-index:2;}
h1{font-size:clamp(20px,5vw,30px);}

button{
    margin-top:15px;
    padding:12px 30px;
    font-size:16px;
    border:none;
    border-radius:25px;
    background:#ff4d6d;
    color:white;
}

/* GATO */
.cat{
    position:fixed;
    bottom:-200px;
    left:50%;
    transform:translateX(-50%);
    font-size:80px;
    transition:1s;
    z-index:3;
}
.show-cat{bottom:10px;}

.envelope{
    position:absolute;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    width:120px;
    height:80px;
    background:#ff81a1;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
}

/* CARTA */
.letter{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:80%;
    max-width:400px;
    background:rgb(255,168,208);
    padding:20px;
    border-radius:15px;
    text-align:center;
    transition:0.5s;
    z-index:4;
}
.show-letter{transform:translate(-50%,-50%) scale(1);}

/* GALERIA */
.galeria{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(180deg,#ffc0cb,#ffb6c1);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    transform:translateX(100%);
    transition:0.5s;
    z-index:10;
}
.show-galeria{transform:translateX(0);}

.galeria-floating{
    position:absolute;
    width:100%;
    height:100%;
    z-index:1;
}

/* SLIDER */
.slider{
    width:90vw;
    max-width:300px;
    height:90vw;
    max-height:300px;
    position:relative;
    z-index:2;
}
.slider img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:15px;
    opacity:0;
    transition:0.5s;
}
.slider img.active{opacity:1;}

/* FINAL */
.final{
    position:fixed;
    width:100%;
    height:100%;
    background:#ff4d6d;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    opacity:0;
    pointer-events:none;
    transition:1s;
    z-index:20;
}
.show-final{
    opacity:1;
    pointer-events:auto;
}

.final-box{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:100%;
    height:100%;
}

.final-buttons{
    display:flex;
    gap:15px;
    margin-top:20px;
    position:relative;
}

/* QR */
.qr{
    width:200px;
    max-width:70vw;
    margin-top:20px;
    border-radius:10px;
    display:none;
}

/* CORAÇÕES */
.heart{
    position:absolute;
    font-size:30px;
    animation: subir 2s forwards;
}
@keyframes subir{
    to{transform:translateY(-200px);opacity:0;}
}
</style>
</head>

<body>

<div class="floating" id="floating"></div>

<div class="start" id="start">
    <h2>💖 surpresa pra você mo 💖</h2>
    <button onclick="iniciar()">Clique aqui ✨</button>
</div>

<div class="container">
<h1>Feliz Aniversário Branquela💖</h1>
<button onclick="mostrarGato()">Abrir surpresa ✨</button>
</div>

<div class="cat" id="cat">
🐱
<div class="envelope" onclick="abrirCarta()">✉️</div>
</div>

<div class="letter" id="letter">
<h2>Pra você minha gatinha 💖</h2>
<p id="texto"></p>
<button onclick="abrirGaleria()">Ver nossas fotos 💖</button>
</div>

<div class="galeria" id="galeria">
<div class="galeria-floating" id="galeriaFloating"></div>
<h2 style="z-index:2;">Ó nois 💖</h2>

<div class="slider" id="slider">
<img src="fotos galeria/foto1.jpeg" class="active">
<img src="fotos galeria/foto2.jpeg">
<img src="fotos galeria/foto3.jpeg">
<img src="fotos galeria/foto4.jpeg">
<img src="fotos galeria/foto5.jpeg">
<img src="fotos galeria/foto6.jpeg">
<img src="fotos galeria/foto7.jpeg">
<img src="fotos galeria/foto8.jpeg">
<img src="fotos galeria/foto9.jpeg">
<img src="fotos galeria 12+/foto10.jpeg">
<img src="fotos galeria 12+/foto11.jpeg">
<img src="fotos galeria 12+/foto12.jpeg">

">



</div>

<button onclick="finalSurpresa()" style="z-index:2;">Final 💖</button>
</div>

<!-- FINAL INTERATIVO -->
<div class="final" id="final">
<div class="final-box">

<h2 id="pergunta">💖 Você ama eu? 💖</h2>

<div class="final-buttons" id="botoes">
<button onclick="respostaSim()">SIM 💖</button>
<button id="btnNao">NÃO 🥹</button>
</div>

<img src="fotos galeria 12+/qrcodeplaylist.jpeg" class="qr" id="qr">

<h2 id="textoFinal" style="display:none;">💖 Eu te amo infinitamente 💖</h2>


</div>
</div>

<audio id="musica" src="musica.mp3" loop></audio>
<audio id="gato" src="gato.mp3"></audio>

<script>

// EMOJIS
const icons=["💖","💕","🎂","💗","😘","😺"];
const container=document.getElementById("floating");

setInterval(()=>{
    let item=document.createElement("div");
    item.className="item";
    item.innerHTML=icons[Math.floor(Math.random()*icons.length)];
    item.style.left=Math.random()*100+"vw";
    item.style.fontSize=(Math.random()*20+20)+"px";
    item.style.animationDuration=(Math.random()*5+5)+"s";
    container.appendChild(item);
    setTimeout(()=>item.remove(),10000);
},500);

// INICIAR
function iniciar(){
    document.getElementById("start").classList.add("hide");
}

// GATO
function mostrarGato(){
    document.getElementById("cat").classList.add("show-cat");
    document.getElementById("gato").play();
}

// DIGITAR
function digitar(texto, elemento){
    elemento.innerHTML="";
    let i=0;
    let intervalo=setInterval(()=>{
        elemento.innerHTML+=texto.charAt(i);
        i++;
        if(i>=texto.length) clearInterval(intervalo);
    },40);
}

// CARTA
function abrirCarta(){
    document.getElementById("letter").classList.add("show-letter");

    const texto=`Feliz aniversário minha gatinha💖
    Quero que você continue sendo essa pessoa incrível, maravilhosa e perfeita que você é. Você ilumina meus dias e faz tudo ficar mais especial.
    Eu te amo muito minha princesa💕 Um beijão grandão pra você, minha totosa😺`;

    digitar(texto, document.getElementById("texto"));

    let musica=document.getElementById("musica");
    musica.volume=0.7;
    musica.play();
}

// GALERIA
function abrirGaleria(){
    document.getElementById("galeria").classList.add("show-galeria");
    document.querySelector(".container").style.display="none";
    document.getElementById("cat").style.display="none";
}

// SLIDES
let index=0;
const slides=document.querySelectorAll("#slider img");

setInterval(()=>{
    slides[index].classList.remove("active");
    index=(index+1)%slides.length;
    slides[index].classList.add("active");
},3000);

// FINAL
function finalSurpresa(){
    document.getElementById("final").classList.add("show-final");
}

// BOTÃO NÃO (CORRIGIDO)
const btnNao=document.getElementById("btnNao");

btnNao.addEventListener("mouseover", fugir);
btnNao.addEventListener("touchstart", fugir);

function fugir(){
    const maxX = window.innerWidth - 120;
    const maxY = window.innerHeight - 60;

    btnNao.style.position="fixed";
    btnNao.style.left = Math.random()*maxX + "px";
    btnNao.style.top = Math.random()*maxY + "px";
}

// SIM
function respostaSim(){
    document.getElementById("pergunta").style.display="none";
    document.getElementById("botoes").style.display="none";

    document.getElementById("textoFinal").style.display="block";
    document.getElementById("qr").style.display="block";

    setInterval(()=>{
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="💖";
        heart.style.left=Math.random()*100+"vw";
        heart.style.top="100vh";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),2000);
    },200);
}

</script>

</body>
</html>
